<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8" />
  <title>Radar Shield</title>
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <link rel="stylesheet" href="style.css" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      background: #0f172a;
      color: #e5e7eb;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }

    header {
      padding: 16px 24px;
      border-bottom: 1px solid rgba(148, 163, 184, 0.3);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      background: rgba(15, 23, 42, 0.95);
      position: sticky;
      top: 0;
      z-index: 10;
      backdrop-filter: blur(12px);
    }

    header h1 {
      font-size: 1.3rem;
      font-weight: 700;
    }

    header p {
      font-size: 0.8rem;
      color: #9ca3af;
    }

    .header-left {
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    .badge {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 2px 8px;
      border-radius: 999px;
      background: rgba(56, 189, 248, 0.1);
      color: #7dd3fc;
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      width: fit-content;
    }

    .badge-dot {
      width: 6px;
      height: 6px;
      border-radius: 999px;
      background: #22c55e;
    }

    .btn {
      border-radius: 999px;
      border: 1px solid rgba(148, 163, 184, 0.5);
      padding: 8px 14px;
      font-size: 0.8rem;
      background: rgba(15, 23, 42, 0.8);
      color: #e5e7eb;
      cursor: pointer;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: background 0.2s, border-color 0.2s, transform 0.1s;
    }

    .btn:hover {
      background: rgba(30, 64, 175, 0.9);
      border-color: rgba(129, 140, 248, 0.9);
      transform: translateY(-1px);
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      padding: 20px 24px 24px;
      gap: 20px;
    }

    .top-grid {
      display: flex;
      gap: 20px;
    }

    .col-left,
    .col-right {
      background: rgba(15, 23, 42, 0.95);
      border-radius: 12px;
      border: 1px solid rgba(148, 163, 184, 0.4);
      padding: 18px 18px 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .col-left { flex: 3; }
    .col-right { flex: 2; }

    h2 {
      font-size: 0.95rem;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #9ca3af;
      margin-bottom: 4px;
    }

    .section {
      border-radius: 10px;
      padding: 12px 12px 10px;
      background: rgba(15, 23, 42, 0.7);
      border: 1px solid rgba(55, 65, 81, 0.8);
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .section small {
      font-size: 0.7rem;
      color: #9ca3af;
    }

    .row {
      display: flex;
      gap: 10px;
    }

    .row > div {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }

    label {
      font-size: 0.8rem;
      color: #cbd5f5;
    }

    input[type="text"],
    input[type="date"],
    input[type="datetime-local"],
    select,
    textarea {
      width: 100%;
      padding: 8px 10px;
      font-size: 0.82rem;
      border-radius: 6px;
      border: 1px solid rgba(75, 85, 99, 0.9);
      background: rgba(15, 23, 42, 0.9);
      color: #e5e7eb;
    }
